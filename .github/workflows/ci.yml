name: CI
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  code-coverage:
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Download code coverage report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
      - name: Code Coverage Report
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: coverage.txt
          flags: unittest
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
  unittest:
    runs-on: ${{matrix.os}}
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version: ${{matrix.go-version}}
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Unittest
        run: make test
      - if: ${{ matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.x' }}
        name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage.txt
      - name: Benchmark
        run: make benchmark
    strategy:
      fail-fast: true
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
  release_sub_packages:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        package: [config/etcd, config/nacos, config/kubernetes, config/apollo, logger/zap, message/kafka]
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - env:
        PACKAGE: ${{ matrix.package }}
        ROOT_TAG: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        git config --global user.name "Github Action"
        git config --global user.email "go-jimu@users.noreply.github.com"

        package_tag="${PACKAGE}/${ROOT_TAG}"
        if git rev-parse -q --verify "refs/tags/${package_tag}" >/dev/null; then
          echo "Package tag ${package_tag} already exists; skipping."
          exit 0
        fi

        previous_tag="$(git tag --list "${PACKAGE}/v*" --sort=-v:refname | head -n 1 || true)"
        if [ -n "${previous_tag}" ] && git diff --quiet "${previous_tag}" HEAD -- "${PACKAGE}"; then
          echo "No changes in ${PACKAGE} since ${previous_tag}; skipping ${package_tag}."
          exit 0
        fi

        if [ -z "${previous_tag}" ]; then
          echo "No previous package tag found for ${PACKAGE}; creating ${package_tag}."
        else
          echo "Changes detected in ${PACKAGE} since ${previous_tag}; creating ${package_tag}."
        fi

        git tag "${package_tag}"
        git push origin "${package_tag}"
