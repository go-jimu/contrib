name: CI
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
    - master
  pull_request:
    branches:
    - master
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write

jobs:
  code-coverage:
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Download code coverage report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
      - name: Code Coverage Report
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: coverage.txt
          flags: unittest
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
  unittest:
    runs-on: ${{matrix.os}}
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true }}
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version: ${{matrix.go-version}}
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Unittest
        run: make test
      - if: ${{ matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.x' }}
        name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage.txt
      - name: Benchmark
        run: make benchmark
    strategy:
      fail-fast: true
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
  release_sub_packages:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/release-packages.yml
    with:
      root_tag: ${{ github.ref_name }}
  auto_release:
    needs: unittest
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}
    outputs:
      new_tag: ${{ steps.autotag.outputs.new_tag }}
    steps:
    - name: Check out master
      uses: actions/checkout@v4
      with:
        ref: master
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Auto Tag
      id: autotag
      uses: jacexh/action-autotag@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch
    - name: Create GitHub Release
      if: ${{ steps.autotag.outputs.new_tag != '' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.autotag.outputs.new_tag }}
        name: ${{ steps.autotag.outputs.new_tag }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  auto_release_sub_packages:
    needs: auto_release
    if: ${{ needs.auto_release.outputs.new_tag != '' }}
    uses: ./.github/workflows/release-packages.yml
    with:
      root_tag: ${{ needs.auto_release.outputs.new_tag }}
